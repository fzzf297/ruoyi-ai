# MySQL for classic RuoYi — deploy separately under /opt/ruoyi-classic/
# NOT part of ruoyi-ai; no code or database shared with admin/agent SQLite.
#
# Usage:
#   mkdir -p /opt/ruoyi-classic && cd /opt/ruoyi-classic
#   cp /opt/ruoyi-ai/deploy/coexist/docker-compose.mysql.yml .
#   cp /opt/ruoyi-ai/deploy/coexist/mysql.env.example .env
#   docker compose -f docker-compose.mysql.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: ruoyi-classic-mysql
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ry}
      MYSQL_USER: ${MYSQL_USER:-ruoyi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ruoyi-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=64M
      - --performance-schema=OFF
      - --key-buffer-size=8M
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 320M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ruoyi-mysql-data:
