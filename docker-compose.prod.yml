version: "3.8"

# Production / offline deployment compose file.
# Uses pre-built images; no build context or registry pull on the target machine.
#
# admin/agent only communicate on the internal Docker network.
# nginx is the sole public entry point (port 80).
#
# Images must be loaded beforehand: sh deploy/load-images.sh
# Then start: sh deploy/deploy.sh

services:
  admin:
    image: ruoyi-ai/admin:latest
    container_name: ruoyi-ai-admin
    expose:
      - "8000"
    environment:
      - ADMIN_API_SECRET_KEY=${ADMIN_API_SECRET_KEY}
      - ADMIN_API_DEFAULT_ADMIN_PASSWORD=${ADMIN_API_DEFAULT_ADMIN_PASSWORD}
    volumes:
      - admin-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  agent:
    image: ruoyi-ai/agent:latest
    container_name: ruoyi-ai-agent
    expose:
      - "8001"
    environment:
      - AGENT_LLM_BASE_URL=${AGENT_LLM_BASE_URL}
      - AGENT_LLM_API_KEY=${AGENT_LLM_API_KEY}
      - AGENT_LLM_MODEL=${AGENT_LLM_MODEL}
      - AGENT_ADMIN_BASE_URL=http://admin:8000
      - AGENT_RATE_LIMIT_PER_MINUTE=${AGENT_RATE_LIMIT_PER_MINUTE:-30}
      - AGENT_MAX_SESSION_MESSAGES=${AGENT_MAX_SESSION_MESSAGES:-100}
      - AGENT_PROJECT_SECRETS=${AGENT_PROJECT_SECRETS:-}
      - AGENT_THIRD_PARTY_ALLOWED_HOSTS=${AGENT_THIRD_PARTY_ALLOWED_HOSTS:-}
      - AGENT_THIRD_PARTY_MAX_RESPONSE_BYTES=${AGENT_THIRD_PARTY_MAX_RESPONSE_BYTES:-1048576}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      admin:
        condition: service_healthy
    volumes:
      - agent-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: ruoyi-ai/nginx:latest
    container_name: ruoyi-ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      admin:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  admin-data:
  agent-data:
