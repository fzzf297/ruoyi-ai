# Nginx: RuoYi 经典版 + ruoyi-ai 共存
#
# 路径隔离（互不抢路由）：
#   /api/admin/  /api/app/  /docs  /openapi.json  → ruoyi-ai admin
#   /api/agent/  /agent/health                        → ruoyi-ai agent
#   /ai/                                              → ruoyi-ai 说明页
#   /                                                → 经典 RuoYi（Java 8080）
#
# RuoYi 经典版自身路径示例：/login /index /system/ /monitor/ 等与上列无冲突。
#
# 使用：替换 deploy/nginx.docker.conf 后重启 nginx：
#   cp deploy/coexist/nginx.docker.conf deploy/nginx.docker.conf
#   docker compose -f docker-compose.prod.yml restart nginx
#
# 前提：经典 RuoYi 监听宿主机 127.0.0.1:8080（见 deploy/coexist/README.md）

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # ---------- ruoyi-ai（Python 管理后台 + Agent）----------

    location /api/admin/ {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/app/ {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/agent/ {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $agent_upstream http://agent:8001;
        proxy_pass $agent_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /agent/health {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $agent_health http://agent:8001/health;
        proxy_pass $agent_health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ai/ {
        return 200 "ruoyi-ai: /docs /api/admin/ /api/agent/\n";
        add_header Content-Type text/plain;
    }

    # ---------- 经典 RuoYi（Java Spring Boot）----------

    location / {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
